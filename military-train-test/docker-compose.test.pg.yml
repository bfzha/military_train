services:
  # 前端服务
  junxun-frontend:
    build:
      context: ../military-train-frontend
      dockerfile: Dockerfile
    image: junxun-frontend:latest
    container_name: junxun-frontend-test
    ports:
      - "80:80"
    volumes:
      - ../military-train-frontend/bin/nginx.dockerpg.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - junxun-backend-pg
    networks:
      - junxun-network-test

  # 后端服务（PostgreSQL版本）
  junxun-backend-pg:
    build:
      context: ../military-train-backend
      dockerfile: Dockerfile.pg
    image: junxun-backend-pg:latest
    container_name: junxun-backend-pg-test
    ports:
      - "9099:9099"
    environment:
      TRANSPORT_CRYPTO_ENABLED: "false"
      TRANSPORT_CRYPTO_MODE: "off"
    depends_on:
      junxun-pg:
        condition: service_healthy
      junxun-redis:
        condition: service_healthy
    networks:
      - junxun-network-test

  # PostgreSQL服务
  junxun-pg:
    image: postgres:14
    container_name: junxun-pg-test
    environment:
      POSTGRES_PASSWORD: root
      POSTGRES_DB: military-train
      POSTGRES_INITDB_ARGS: --encoding=UTF8 --lc-collate=C --lc-ctype=C
    ports:
      - "15433:5432"
    volumes:
      - ../military-train-backend/sql/military-train-pg.sql:/docker-entrypoint-initdb.d/01-military-train-pg.sql
      - ./disable_captcha.sql:/docker-entrypoint-initdb.d/02-disable-captcha.sql
    networks:
      - junxun-network-test
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres"]
      interval: 5s
      timeout: 10s
      retries: 30

  # Redis服务
  junxun-redis:
    image: redis:latest
    container_name: junxun-redis-test
    ports:
      - "16381:6379"
    networks:
      - junxun-network-test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30

# 网络配置
networks:
  junxun-network-test:
    name: junxun-network-test
    driver: bridge