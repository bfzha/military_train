services:
  # 前端服务
  junxun-frontend:
    build:
      context: ../military-train-frontend
      dockerfile: Dockerfile
    image: junxun-frontend:latest
    container_name: junxun-frontend-test
    ports:
      - "80:80"
    volumes:
      - ../military-train-frontend/bin/nginx.dockermy.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - junxun-backend-my
    networks:
      - junxun-network-test

  # 后端服务（MySQL版本）
  junxun-backend-my:
    build:
      context: ../military-train-backend
      dockerfile: Dockerfile.my
    image: junxun-backend-my:latest
    container_name: junxun-backend-my-test
    ports:
      - "9099:9099"
    environment:
      TRANSPORT_CRYPTO_ENABLED: "false"
      TRANSPORT_CRYPTO_MODE: "off"
    depends_on:
      junxun-mysql:
        condition: service_healthy
      junxun-redis:
        condition: service_healthy
    networks:
      - junxun-network-test

  # MySQL服务
  junxun-mysql:
    image: mysql:8.0
    container_name: junxun-mysql-test
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: military-train
    ports:
      - "13307:3306"
    volumes:
      - ../military-train-backend/sql/military-train.sql:/docker-entrypoint-initdb.d/01-military-train.sql
      - ./disable_captcha.sql:/docker-entrypoint-initdb.d/02-disable-captcha.sql
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_general_ci --skip-character-set-client-handshake=1
    networks:
      - junxun-network-test
    healthcheck:
      test: ["CMD", "bash", "-c", "mysqladmin ping -h localhost -u root -proot && mysql -h localhost -u root -proot -e 'SELECT 1'"]
      interval: 5s
      timeout: 10s
      retries: 30

  # Redis服务
  junxun-redis:
    image: redis:latest
    container_name: junxun-redis-test
    ports:
      - "16380:6379"
    networks:
      - junxun-network-test
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 30

# 网络配置
networks:
  junxun-network-test:
    name: junxun-network-test
    driver: bridge